name: invariants

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  invariants:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: chmod +x ci/check-invariants.sh && ci/check-invariants.sh
